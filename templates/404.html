{% extends "base.html" %}

{% block title %}Post Not Found - Hacker News Report{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl rounded-2xl border border-slate-200 bg-white p-10 text-center shadow-soft dark:border-slate-800 dark:bg-slate-900">
    <h1 class="text-7xl font-black tracking-tight text-brand-600">404</h1>
    <h2 class="mt-2 text-2xl font-bold text-slate-900 dark:text-slate-100">Post Not Found</h2>
    <p class="mt-3 text-sm text-slate-600 dark:text-slate-400">The post you're looking for doesn't exist in the database.</p>
    <a href="/" class="mt-6 inline-flex rounded-lg bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-brand-700">Go back home</a>
</div>
{% endblock %}
