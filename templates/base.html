<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hacker News Report{% endblock %}</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦉</text></svg>"
        type="image/svg+xml">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="app-body">
    <div class="app-background"></div>
    <header class="site-header">
        <div class="site-header__inner">
            <h1 class="site-title">
                <a href="/" class="site-title__link">🦉 Hacker News Report</a>
            </h1>
            <nav class="site-nav">
                <div class="search-box">
                    <form action="/search" method="get" class="search-box__form">
                        <input type="text" name="q" placeholder="Search posts..."
                            value="{{ search_query if search_query else '' }}" class="search-box__input">
                        <button type="submit" class="search-box__btn">🔍</button>
                    </form>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">☀️</button>
                <a href="/" class="site-link">Home</a>
                <a href="https://github.com/iJKENNEDY/hackernews-report" target="_blank" class="site-link site-link--primary">GitHub</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="site-footer__inner">
            <p>Hacker News Report - Built with Flask & Python</p>
        </div>
    </footer>
    <script>
        (function () {
            const toggle = document.getElementById('theme-toggle');
            if (!toggle) return;
            const LS_KEY = 'hnr-theme';
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                    document.body.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    document.body.classList.remove('dark');
                }
                updateIcon();
            }
            function updateIcon() {
                if (document.documentElement.classList.contains('dark')) toggle.textContent = '🌙';
                else toggle.textContent = '☀️';
            }
            // default to light
            const saved = localStorage.getItem(LS_KEY);
            applyTheme(saved === 'dark' ? 'dark' : 'light');
            toggle.addEventListener('click', function () {
                const isDark = document.documentElement.classList.toggle('dark');
                document.body.classList.toggle('dark', isDark);
                localStorage.setItem(LS_KEY, isDark ? 'dark' : 'light');
                updateIcon();
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
